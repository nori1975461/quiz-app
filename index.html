<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>一般常識クイズ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">

    <!-- スタート画面 -->
    <div id="screen-start" class="screen active">
      <h1 class="app-title">一般常識クイズ</h1>

      <div class="setting-group">
        <p class="setting-label">カテゴリ</p>
        <div id="category-btns" class="toggle-group">
          <button class="toggle-btn active" data-value="すべて">すべて</button>
          <button class="toggle-btn" data-value="地理">地理</button>
          <button class="toggle-btn" data-value="科学">科学</button>
          <button class="toggle-btn" data-value="歴史">歴史</button>
          <button class="toggle-btn" data-value="文化">文化</button>
        </div>
      </div>

      <div class="setting-group">
        <p class="setting-label">問題数</p>
        <div id="count-btns" class="toggle-group">
          <button class="toggle-btn active" data-value="5">5問</button>
          <button class="toggle-btn" data-value="10">10問</button>
          <button class="toggle-btn" data-value="all">全問</button>
        </div>
      </div>

      <button id="btn-start" class="btn btn-primary">スタート</button>
      <button id="btn-history" class="btn btn-secondary">スコア履歴を見る</button>
    </div>

    <!-- 問題画面 -->
    <div id="screen-quiz" class="screen">
      <div class="progress-bar-wrap">
        <div id="progress-bar" class="progress-bar"></div>
      </div>
      <div class="quiz-meta">
        <p id="question-count" class="question-count"></p>
        <div id="timer" class="timer">30</div>
      </div>
      <h2 id="question-text" class="question-text"></h2>
      <div id="choices" class="choices"></div>
      <div id="feedback" class="feedback hidden"></div>
      <button id="btn-next" class="btn btn-primary hidden">次の問題へ</button>
    </div>

    <!-- 結果画面 -->
    <div id="screen-result" class="screen">
      <h2 class="result-title">結果発表</h2>
      <p id="score-text" class="score-text"></p>
      <p id="score-comment" class="score-comment"></p>
      <button id="btn-retry" class="btn btn-primary">もう一度挑戦する</button>
      <button id="btn-to-history" class="btn btn-secondary">スコア履歴を見る</button>
    </div>

    <!-- 履歴画面 -->
    <div id="screen-history" class="screen">
      <h2 class="history-title">スコア履歴</h2>
      <div id="history-list" class="history-list"></div>
      <button id="btn-clear-history" class="btn btn-danger">履歴を削除</button>
      <button id="btn-back" class="btn btn-secondary">戻る</button>
    </div>

  </div>
  <script src="script.js"></script>
</body>
</html>
